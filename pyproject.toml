[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "agentic-workspace"
version = "0.0.0"
description = "Monorepo host for agentic-memory and agentic-planning."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
  "pytest",
  "pytest-cov",
  "ruff",
  "ty",
  "pymarkdownlnt",
]

[tool.uv]
package = false

[tool.uv.workspace]
members = [
  "packages/memory",
  "packages/planning",
]
