[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "agentic-memory-bootstrap"
version = "0.2.5"
description = "Install the agentic memory bootstrap into an existing repository."
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "Rickard von Haugwitz" },
  { name = "OpenAI Codex" },
]
dependencies = []

[project.scripts]
agentic-memory-bootstrap = "repo_memory_bootstrap.cli:main"

[dependency-groups]
dev = [
  "pyyaml",
  "pytest",
  "ruff",
  "ty",
]

[tool.hatch.build.targets.wheel]
packages = ["src/repo_memory_bootstrap"]

[tool.hatch.build.targets.wheel.force-include]
"bootstrap" = "src/repo_memory_bootstrap/_payload"
"skills" = "src/repo_memory_bootstrap/_skills"

[tool.hatch.build.targets.sdist]
include = [
  "/README.md",
  "/bootstrap",
  "/skills",
  "/src/repo_memory_bootstrap",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
