version = 1

[rules]
routing_only = ["memory/index.md"]
high_level = ["memory/index.md", "memory/current/project-state.md"]
canonical_dirs = [
  "memory/domains",
  "memory/invariants",
  "memory/runbooks",
  "memory/mistakes",
  "memory/decisions",
]
task_board_globs = ["TODO.md", "tasks/**", ".github/issues/**"]
core_doc_globs = ["README.md", "docs/**/*.md", "CONTRIBUTING.md", ".github/**/*.md"]
core_doc_exclude_globs = ["AGENTS.md", "memory/**/*.md", "memory/bootstrap/**/*.md"]
forbid_core_docs_depend_on_memory = false
# Recommended audience conventions for planner-agnostic routing:
# - agent_bootstrap
# - human_operator
# - shared_invariant
# Existing repos may keep their current audience values; these labels are guidance only.

[notes."memory/index.md"]
note_type = "routing"
canonical_home = "memory/index.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "required"
subsystems = ["memory-system"]
surfaces = ["decision", "runtime", "api", "retrieval", "tests", "architecture"]
routes_from = ["AGENTS.md", "memory/**/*.md"]
stale_when = ["memory/**/*.md"]
routing_only = true
high_level = true

[notes."memory/current/project-state.md"]
note_type = "current-overview"
canonical_home = "memory/current/project-state.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["current-context"]
surfaces = ["decision", "architecture"]
routes_from = ["README.md", "memory/system/**/*.md", "bootstrap/**/*.md"]
stale_when = ["README.md", "memory/system/**/*.md", "bootstrap/**/*.md"]

[notes."memory/current/task-context.md"]
note_type = "current-context"
canonical_home = "memory/current/task-context.md"
authority = "canonical"
audience = "agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["current-context"]
surfaces = ["decision", "api", "tests", "architecture"]
routes_from = []
stale_when = []
# Use this note only for optional continuation compression:
# active goal, touched surfaces, blocking assumptions, and next validation.

[notes."memory/system/WORKFLOW.md"]
note_type = "workflow-policy"
canonical_home = "memory/system/WORKFLOW.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "required"
subsystems = ["memory-system"]
surfaces = ["decision", "architecture"]
routes_from = ["AGENTS.md", "memory/index.md"]
stale_when = ["AGENTS.md", "memory/index.md", "bootstrap/AGENTS.md"]
related_validations = ["python scripts/check/check_memory_freshness.py"]

[notes."memory/system/VERSION.md"]
note_type = "version-marker"
canonical_home = "memory/system/VERSION.md"
authority = "canonical"
audience = "agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["installer", "payload"]
surfaces = ["api"]
routes_from = ["src/**/*.py", "pyproject.toml"]
stale_when = ["src/**/*.py", "pyproject.toml", "bootstrap/memory/system/VERSION.md"]

[notes."memory/mistakes/recurring-failures.md"]
note_type = "recurring-failures"
canonical_home = "memory/mistakes/recurring-failures.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["tests", "architecture"]
routes_from = ["tests/**/*.py", "scripts/check/**/*.py"]
stale_when = ["tests/**/*.py", "scripts/check/**/*.py"]
related_validations = ["python scripts/check/check_memory_freshness.py"]
