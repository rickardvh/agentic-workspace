repos:
  - repo: local
    hooks:
      - id: format
        name: format
        entry: make format
        language: system
        pass_filenames: false
      - id: lint
        name: lint
        entry: make lint
        language: system
        pass_filenames: false
      - id: master-tests
        name: master tests
        entry: uv run python scripts/check/check_master_tests.py
        language: system
        pass_filenames: false
      - id: no-absolute-paths
        name: no absolute paths
        entry: uv run python scripts/check/check_no_absolute_paths.py
        language: system
        pass_filenames: false
