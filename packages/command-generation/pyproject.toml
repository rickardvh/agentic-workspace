[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "agentic-command-generation"
version = "0.0.0"
description = "Internal generic command package generation boundary for Agentic Workspace dogfooding."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["src/agentic_command_generation"]

[tool.hatch.build.targets.sdist]
include = [
  "/README.md",
  "/src/agentic_command_generation",
]
