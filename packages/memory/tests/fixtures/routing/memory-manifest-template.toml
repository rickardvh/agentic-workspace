version = 1

[rules]
routing_only = [".agentic-workspace/memory/repo/index.md"]
high_level = [".agentic-workspace/memory/repo/index.md", ".agentic-workspace/memory/repo/current/project-state.md"]
canonical_dirs = [
  ".agentic-workspace/memory/repo/domains",
  ".agentic-workspace/memory/repo/invariants",
  ".agentic-workspace/memory/repo/runbooks",
  ".agentic-workspace/memory/repo/mistakes",
  ".agentic-workspace/memory/repo/decisions",
]
task_board_globs = ["TODO.md", "tasks/**", ".github/issues/**"]
core_doc_globs = ["README.md", "docs/**/*.md", "CONTRIBUTING.md", ".github/**/*.md"]
core_doc_exclude_globs = ["AGENTS.md", ".agentic-workspace/memory/repo/**/*.md", ".agentic-workspace/memory/**/*.md"]
forbid_core_docs_depend_on_memory = false
# Recommended audience conventions for planner-agnostic routing:
# - agent_bootstrap
# - human_operator
# - shared_invariant
# Existing repos may keep their current audience values; these labels are guidance only.
# Optional improvement-pressure fields:
# - memory_role = "durable_truth" | "improvement_signal"
# - symptom_of = "workflow_friction" | "guidance_drift" | "missing_guardrail" | "architecture_friction" | "operator_complexity"
# - preferred_remediation = "docs" | "skill" | "script" | "test" | "validation" | "refactor" | "code"
# - improvement_candidate = true
# - improvement_note = "short advisory hint"
# - elimination_target = "shrink" | "promote" | "automate" | "refactor_away"
# - retention_justification = "short reason the note should remain despite being an improvement signal"
# - config_treatment = "promote" | "cleanup" | "retain" | "no_action"
# - config_note = "short note describing which current config rule or posture shaped that treatment"
# These fields are advisory only; existing manifests remain valid without them.

[notes.".agentic-workspace/memory/repo/index.md"]
note_type = "routing"
canonical_home = ".agentic-workspace/memory/repo/index.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "required"
subsystems = ["memory-system"]
surfaces = ["decision", "runtime", "api", "retrieval", "tests", "architecture"]
routes_from = ["AGENTS.md", ".agentic-workspace/memory/repo/**/*.md"]
stale_when = [".agentic-workspace/memory/repo/**/*.md"]
routing_only = true
high_level = true

[notes.".agentic-workspace/memory/repo/current/project-state.md"]
note_type = "current-overview"
canonical_home = ".agentic-workspace/memory/repo/current/project-state.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["current-context"]
surfaces = []
routes_from = ["README.md", ".agentic-workspace/memory/**/*.md", "bootstrap/**/*.md"]
stale_when = ["README.md", ".agentic-workspace/memory/**/*.md", "bootstrap/**/*.md"]
memory_role = "durable_truth"

[notes.".agentic-workspace/memory/repo/current/task-context.md"]
note_type = "current-context"
canonical_home = ".agentic-workspace/memory/repo/current/task-context.md"
authority = "canonical"
audience = "agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["current-context"]
surfaces = []
routes_from = []
stale_when = []
# Use this note only for optional continuation compression:
# active goal, touched surfaces, blocking assumptions, and next validation.

[notes.".agentic-workspace/memory/repo/current/routing-feedback.md"]
note_type = "routing-feedback"
canonical_home = ".agentic-workspace/memory/repo/current/routing-feedback.md"
authority = "canonical"
audience = "agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system", "routing"]
surfaces = []
routes_from = []
stale_when = []
# Use this note only for compact routing calibration:
# concrete missed-note or over-routing cases worth revisiting after manifest or index changes.

[notes.".agentic-workspace/memory/repo/domains/README.md"]
note_type = "domain"
canonical_home = ".agentic-workspace/memory/repo/domains/README.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["runtime", "api", "retrieval", "tests", "architecture"]
routes_from = []
stale_when = []
memory_role = "durable_truth"

[notes.".agentic-workspace/memory/repo/invariants/README.md"]
note_type = "invariant"
canonical_home = ".agentic-workspace/memory/repo/invariants/README.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["api", "retrieval", "architecture"]
routes_from = []
stale_when = []
memory_role = "durable_truth"

[notes.".agentic-workspace/memory/repo/runbooks/README.md"]
note_type = "runbook"
canonical_home = ".agentic-workspace/memory/repo/runbooks/README.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["runtime"]
routes_from = []
stale_when = []
memory_role = "durable_truth"

[notes.".agentic-workspace/memory/repo/decisions/README.md"]
note_type = "decision"
canonical_home = ".agentic-workspace/memory/repo/decisions/README.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system", "product"]
surfaces = ["decision", "architecture"]
routes_from = []
stale_when = []
memory_role = "durable_truth"

[notes.".agentic-workspace/memory/WORKFLOW.md"]
note_type = "workflow-policy"
canonical_home = ".agentic-workspace/memory/WORKFLOW.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = []
routes_from = ["AGENTS.md", ".agentic-workspace/memory/repo/index.md", ".agentic-workspace/memory/repo/manifest.toml", ".agentic-workspace/memory/**/*.md"]
stale_when = ["AGENTS.md", ".agentic-workspace/memory/repo/index.md", ".agentic-workspace/memory/repo/manifest.toml", "bootstrap/AGENTS.md"]
related_validations = ["python scripts/check/check_memory_freshness.py"]
memory_role = "durable_truth"

[notes.".agentic-workspace/memory/VERSION.md"]
note_type = "version-marker"
canonical_home = ".agentic-workspace/memory/VERSION.md"
authority = "canonical"
audience = "agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["installer", "payload"]
surfaces = []
routes_from = ["pyproject.toml", ".agentic-workspace/memory/VERSION.md", ".agentic-workspace/memory/VERSION.md", "bootstrap/.agentic-workspace/memory/VERSION.md"]
stale_when = ["pyproject.toml", ".agentic-workspace/memory/VERSION.md", ".agentic-workspace/memory/VERSION.md", "bootstrap/.agentic-workspace/memory/VERSION.md"]

[notes.".agentic-workspace/memory/repo/mistakes/recurring-failures.md"]
note_type = "recurring-failures"
canonical_home = ".agentic-workspace/memory/repo/mistakes/recurring-failures.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["tests"]
routes_from = ["tests/**/*.py", "scripts/check/**/*.py"]
stale_when = ["tests/**/*.py", "scripts/check/**/*.py"]
related_validations = ["python scripts/check/check_memory_freshness.py"]
memory_role = "improvement_signal"
symptom_of = "missing_guardrail"
preferred_remediation = "test"
improvement_candidate = true
improvement_note = "If recurring failures persist, consider a regression test, validation, or lint rule before growing the note."
elimination_target = "shrink"
config_treatment = "promote"
config_note = "Use current config to decide whether repeated failure evidence should graduate into stronger enforcement."
