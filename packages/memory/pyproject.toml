[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "agentic-memory"
version = "0.3.11"
description = "Install the agentic memory bootstrap into an existing repository."
readme = "README.md"
requires-python = ">=3.11"
keywords = ["agents", "bootstrap", "developer-tools", "memory", "repository"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Quality Assurance",
]
authors = [
  { name = "Rickard von Haugwitz" },
]
dependencies = []

[project.urls]
Homepage = "https://github.com/rickardvh/agentic-workspace/tree/master/packages/memory"
Repository = "https://github.com/rickardvh/agentic-workspace"
Issues = "https://github.com/rickardvh/agentic-workspace/issues"

[project.scripts]
agentic-memory = "repo_memory_bootstrap.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/repo_memory_bootstrap"]

[tool.hatch.build.targets.wheel.force-include]
"bootstrap" = "src/repo_memory_bootstrap/_payload"
"src/repo_memory_bootstrap/_ownership.toml" = "src/repo_memory_bootstrap/_ownership.toml"
"skills" = "src/repo_memory_bootstrap/_skills"
"../../generated/python/memory-cli/generated_cli_package/__init__.py" = "src/repo_memory_bootstrap/_generated_cli_package_impl/__init__.py"
"../../generated/python/memory-cli/generated_cli_package/command_package.json" = "src/repo_memory_bootstrap/_generated_cli_package_impl/command_package.json"
"../../generated/python/memory-cli/generated_cli_package/adapter_commands.json" = "src/repo_memory_bootstrap/_generated_cli_package_impl/adapter_commands.json"

[tool.hatch.build.targets.sdist]
include = [
  "/README.md",
  "/bootstrap",
  "/skills",
  "/src/repo_memory_bootstrap",
]

[tool.hatch.build.targets.sdist.force-include]
"../../generated/python/memory-cli/generated_cli_package/__init__.py" = "src/repo_memory_bootstrap/_generated_cli_package_impl/__init__.py"
"../../generated/python/memory-cli/generated_cli_package/command_package.json" = "src/repo_memory_bootstrap/_generated_cli_package_impl/command_package.json"
"../../generated/python/memory-cli/generated_cli_package/adapter_commands.json" = "src/repo_memory_bootstrap/_generated_cli_package_impl/adapter_commands.json"

[tool.pytest.ini_options]
addopts = [
  "--import-mode=importlib",
  "--cov=repo_memory_bootstrap",
  "--cov-report=term-missing:skip-covered",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 140
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
ignore = ["E501"]
select = ["E", "F", "I"]

[tool.coverage.run]
source = ["repo_memory_bootstrap"]

[tool.coverage.report]
show_missing = true
skip_covered = true

