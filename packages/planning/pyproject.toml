[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "agentic-planning"
version = "0.1.2"
description = "Install a checked-in planning bootstrap for execution into an existing repository."
readme = "README.md"
requires-python = ">=3.11"
keywords = ["agents", "bootstrap", "execution-steering", "planning", "repository", "workflow"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Build Tools",
]
authors = [
  { name = "Rickard von Haugwitz" },
]
dependencies = ["agentic-command-generation", "jsonschema>=4.0"]

[tool.uv.sources]
agentic-command-generation = { workspace = true }

[project.urls]
Homepage = "https://github.com/rickardvh/agentic-workspace/tree/master/packages/planning"
Repository = "https://github.com/rickardvh/agentic-workspace"
Issues = "https://github.com/rickardvh/agentic-workspace/issues"

[project.scripts]
agentic-planning = "agentic_command_generation.planning_generated_cli_package:main"

[tool.hatch.build.targets.wheel]
packages = ["src/repo_planning_bootstrap"]

[tool.hatch.build.targets.wheel.force-include]
"bootstrap/AGENTS.template.md" = "src/repo_planning_bootstrap/_payload/AGENTS.template.md"
"bootstrap/.agentic-workspace/docs" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/docs"
"bootstrap/.agentic-workspace/planning/decompositions" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/planning/decompositions"
"bootstrap/.agentic-workspace/planning/execplans" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/planning/execplans"
"bootstrap/.agentic-workspace/planning/reviews" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/planning/reviews"
"bootstrap/.agentic-workspace/planning/schemas" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/planning/schemas"
"bootstrap/.agentic-workspace/planning/upstream-task-intake.md" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/planning/upstream-task-intake.md"
"bootstrap/.agentic-workspace/planning/pre-ingestion-refinement.md" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/planning/pre-ingestion-refinement.md"
"bootstrap/.agentic-workspace/planning/UPGRADE-SOURCE.toml" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/planning/UPGRADE-SOURCE.toml"
"bootstrap/.agentic-workspace/planning/agent-manifest.json" = "src/repo_planning_bootstrap/_payload/.agentic-workspace/planning/agent-manifest.json"
"skills" = "src/repo_planning_bootstrap/_skills"
"src/repo_planning_bootstrap/_ownership.toml" = "src/repo_planning_bootstrap/_ownership.toml"
"../../generated/python/planning-cli/generated_cli_package/__init__.py" = "src/repo_planning_bootstrap/_generated_cli_package_impl/__init__.py"
"../../generated/python/planning-cli/generated_cli_package/command_package.json" = "src/repo_planning_bootstrap/_generated_cli_package_impl/command_package.json"
"../../generated/python/planning-cli/generated_cli_package/adapter_commands.json" = "src/repo_planning_bootstrap/_generated_cli_package_impl/adapter_commands.json"
"../../generated/python/planning-cli/generated_cli_package/operations" = "src/repo_planning_bootstrap/_generated_cli_package_impl/operations"
"../../generated/python/planning-cli/generated_cli_package/planning_runtime_cli.py" = "src/repo_planning_bootstrap/_generated_cli_package_impl/planning_runtime_cli.py"
"../../generated/python/planning-cli/generated_cli_package/planning_operation_ir_executor.py" = "src/repo_planning_bootstrap/_generated_cli_package_impl/planning_operation_ir_executor.py"

[tool.hatch.build.targets.sdist]
include = [
  "/README.md",
  "/bootstrap",
  "/skills",
  "/src/repo_planning_bootstrap",
  "/tests",
]

[tool.hatch.build.targets.sdist.force-include]
"../../generated/python/planning-cli/generated_cli_package/__init__.py" = "src/repo_planning_bootstrap/_generated_cli_package_impl/__init__.py"
"../../generated/python/planning-cli/generated_cli_package/command_package.json" = "src/repo_planning_bootstrap/_generated_cli_package_impl/command_package.json"
"../../generated/python/planning-cli/generated_cli_package/adapter_commands.json" = "src/repo_planning_bootstrap/_generated_cli_package_impl/adapter_commands.json"
"../../generated/python/planning-cli/generated_cli_package/operations" = "src/repo_planning_bootstrap/_generated_cli_package_impl/operations"
"../../generated/python/planning-cli/generated_cli_package/planning_runtime_cli.py" = "src/repo_planning_bootstrap/_generated_cli_package_impl/planning_runtime_cli.py"
"../../generated/python/planning-cli/generated_cli_package/planning_operation_ir_executor.py" = "src/repo_planning_bootstrap/_generated_cli_package_impl/planning_operation_ir_executor.py"

[tool.pytest.ini_options]
addopts = [
  "--import-mode=importlib",
  "--cov=repo_planning_bootstrap",
  "--cov-report=term-missing:skip-covered",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 140
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
ignore = ["E501"]
select = ["E", "F", "I"]

[tool.coverage.run]
source = ["repo_planning_bootstrap"]
