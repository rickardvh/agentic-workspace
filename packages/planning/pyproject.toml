[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "agentic-planning-bootstrap"
version = "0.1.2"
description = "Install a checked-in planning bootstrap for execution into an existing repository."
readme = "README.md"
requires-python = ">=3.11"
keywords = ["agents", "bootstrap", "execution-steering", "planning", "repository", "workflow"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Build Tools",
]
authors = [
  { name = "Rickard von Haugwitz" },
]
dependencies = []

[project.urls]
Homepage = "https://github.com/rickardvh/agentic-workspace/tree/master/packages/planning"
Repository = "https://github.com/rickardvh/agentic-workspace"
Issues = "https://github.com/rickardvh/agentic-workspace/issues"

[project.scripts]
agentic-planning-bootstrap = "repo_planning_bootstrap.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/repo_planning_bootstrap"]

[tool.hatch.build.targets.wheel.force-include]
"bootstrap" = "src/repo_planning_bootstrap/_payload"
"skills" = "src/repo_planning_bootstrap/_skills"
"src/repo_planning_bootstrap/_ownership.toml" = "src/repo_planning_bootstrap/_ownership.toml"

[tool.hatch.build.targets.sdist]
include = [
  "/README.md",
  "/bootstrap",
  "/skills",
  "/src/repo_planning_bootstrap",
  "/tests",
]

[tool.pytest.ini_options]
addopts = [
  "--cov=repo_planning_bootstrap",
  "--cov-report=term-missing:skip-covered",
]
testpaths = ["tests"]

[tool.ruff]
line-length = 140
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.coverage.run]
source = ["repo_planning_bootstrap"]
