name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  workspace-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync workspace dependencies
        run: make sync-all

      - name: Run root generated CLI smoke tests
        run: uv run pytest tests/test_generated_tool_conformance.py::test_generated_tool_process_conformance_contracts[modules.report.process] tests/test_generated_tool_conformance.py::test_generated_tool_process_conformance_contracts[defaults.root-cli-authority.process] -q

      - name: Run workspace lint
        run: make lint-workspace

      - name: Verify root generated CLI
        run: make verify-workspace

      - name: Check generated command packages
        run: uv run python scripts/check/check_generated_command_packages.py

  workspace-package-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync workspace dependencies
        run: make sync-all

      - name: Build Agentic Workspace package artifacts
        run: |
          uv build --wheel --sdist --out-dir dist
          uv build --wheel --sdist --out-dir dist packages/memory
          uv build --wheel --sdist --out-dir dist packages/planning
          uv build --wheel --sdist --out-dir dist packages/verification

      - name: Run built package smoke tests
        run: uv run pytest tests/test_workspace_packaging.py::test_installed_workspace_wheel_imports_cli_module tests/test_workspace_packaging.py::test_installed_workspace_stack_runs_fresh_repo_cli_sequence -q

      - name: Upload Agentic Workspace package artifacts
        uses: actions/upload-artifact@v6.0.0
        with:
          name: agentic-workspace-package-artifacts
          path: dist/*
          if-no-files-found: error

  package-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [memory, planning, verification]
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Sync package-scoped dependencies
        run: make sync-${{ matrix.package }}

      - name: Run package checks
        run: make check-${{ matrix.package }}
