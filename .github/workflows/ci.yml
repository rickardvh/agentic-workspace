name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  migration-scaffold-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Verify migration docs exist
        run: |
          test -f docs/migration/monorepo-migration-plan.md
          test -f docs/migration/import-map.md
          test -f TODO.md
          test -f ROADMAP.md
