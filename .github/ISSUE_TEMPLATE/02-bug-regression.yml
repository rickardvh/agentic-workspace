name: Bug / Regression
description: Report a correctness, reliability, or regression problem in the repo or shipped product.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for broken behavior, regressions, and reliability failures.

        Before filing, ask:
        “Could or should this have been found, prevented, or remediated by the product itself?”

  - type: checkboxes
    id: existing_issue
    attributes:
      label: Existing issue check
      options:
        - label: I searched the existing issues first
          required: true

  - type: dropdown
    id: affected_surface
    attributes:
      label: Affected surface
      options:
        - Workspace / orchestrator
        - Planning surfaces
        - Memory surfaces
        - Structured config
        - Workflow substrate
        - System intent
        - Startup / routing adapters
        - Proof / review / validation
        - Repo-local / unknown
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      placeholder: What broke, failed, or produced the wrong result?
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: final_satisfaction
    attributes:
      label: Final satisfaction
      description: What must be true before this issue is complete, including the final fixed behavior and any blocking gaps?
      placeholder: Describe the final corrected state that closes this bug.
    validations:
      required: true

  - type: textarea
    id: bounded_slice_success
    attributes:
      label: Bounded slice success
      description: What useful partial fix may land while preserving remaining bug intent and ownership?
      placeholder: Describe any partial mitigation that may land without claiming the bug is fixed.
    validations:
      required: true

  - type: dropdown
    id: partial_pr_may_close
    attributes:
      label: Partial PR may close
      description: Can a partial fix close this bug without satisfying the final expected behavior?
      options:
        - "no"
        - "yes"
    validations:
      required: true

  - type: textarea
    id: required_follow_up_owner
    attributes:
      label: Required follow-up owner
      description: If a partial fix lands, where must remaining work be owned?
      placeholder: Issue, parent lane, planning state, module owner, or none.
    validations:
      required: true

  - type: textarea
    id: required_residual_intent
    attributes:
      label: Required residual intent
      description: What bug-fix intent must remain open after a partial fix?
      placeholder: Name the remaining behavior gap that must not be lost.
    validations:
      required: true

  - type: textarea
    id: evidence_required_for_final_completion
    attributes:
      label: Evidence required for final completion
      description: What proof, regression test, or review evidence is required before this bug can honestly close?
      placeholder: Name the evidence that proves the final expected behavior.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start from...
        2. Run...
        3. Open...
        4. Observe...
      render: shell
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include logs, file paths, screenshots, issue links, or related commits.
      placeholder: Paste the smallest useful evidence set.
    validations:
      required: false

  - type: dropdown
    id: product_first
    attributes:
      label: Should this be addressed in the shipped product first?
      options:
        - "Yes: this looks like a package or contract defect"
        - "Maybe: repo symptom, but product changes may help"
        - "No: this appears repo-local"
    validations:
      required: true

  - type: textarea
    id: product_reasoning
    attributes:
      label: Product-first reasoning
      placeholder: Could or should this have been found, prevented, or remediated by the product itself?
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - Blocking current work
        - Should be scheduled soon
        - Useful follow-up, not urgent
    validations:
      required: true
