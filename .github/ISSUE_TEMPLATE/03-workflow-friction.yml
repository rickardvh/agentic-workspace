name: Workflow Friction
description: Report confusing instructions, handoff failures, or agent workflow friction discovered while working in the repo.
title: "[Workflow]: "
labels:
  - workflow
body:
  - type: markdown
    attributes:
      value: |
        Use this form for agent workflow friction, confusing repo instructions, or handoff failures.

        This repo is a dogfooding surface. If a workflow problem here points to a package or contract weakness, say so explicitly.

  - type: checkboxes
    id: existing_issue
    attributes:
      label: Existing issue check
      description: Avoid filing duplicates.
      options:
        - label: I searched the existing issues first
          required: true

  - type: textarea
    id: task_context
    attributes:
      label: Task context
      description: Describe the task or flow where the friction showed up.
      placeholder: What were you trying to do when this became confusing or costly?
    validations:
      required: true

  - type: textarea
    id: friction
    attributes:
      label: What was confusing or expensive?
      placeholder: Call out the instruction, workflow step, handoff, or tool behavior that caused friction.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened instead?
      placeholder: Describe the cleaner, quieter, or safer workflow you expected.
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Where did the friction seem to originate?
      options:
        - shipped package or contract
        - repo-local workflow or documentation
        - both
        - not sure yet
    validations:
      required: true

  - type: textarea
    id: product_reasoning
    attributes:
      label: Product-first reasoning
      description: Answer this directly if possible.
      placeholder: Could or should this have been found, prevented, or remediated by the product itself?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include prompts, file paths, review notes, logs, or screenshots.
      placeholder: Add the smallest evidence set that makes the friction concrete.
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Bounded next step
      description: Keep the likely follow-up small.
      placeholder: What is the smallest useful change, check, or plan item?
    validations:
      required: true
