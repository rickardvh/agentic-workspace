name: External Planning Intake
description: Capture follow-up work, product signals, and candidate plan items in a form that routes cleanly.
title: "[Planning]: "
labels:
  - planning
body:
  - type: markdown
    attributes:
      value: |
        Use this template for work that should feed the repository's planning loop.

        Before filing, ask:
        "Could or should this have been found, prevented, or remediated by the product itself?"

        Prefer product/package improvements over repo-local workarounds when the same issue would matter in other repositories.

  - type: checkboxes
    id: existing_issue
    attributes:
      label: Existing issue check
      description: Avoid filing duplicate planning signals.
      options:
        - label: I searched the existing issues first
          required: true

  - type: dropdown
    id: issue_kind
    attributes:
      label: What kind of planning signal is this?
      description: Pick the closest fit.
      options:
        - Dogfooding friction
        - Product gap
        - Reliability or correctness issue
        - Workflow or handoff problem
        - Documentation or contract gap
        - Cleanup or maintenance follow-up
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the issue, friction, or follow-up that should enter planning.
      placeholder: What happened, what was hard, or what needs to change?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context and evidence
      description: Include reproduction steps, links, logs, review artifacts, or notes that make the signal actionable.
      placeholder: Relevant commands, files, docs/reviews entries, or examples.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior or better outcome
      description: State the result the repo, workflow, or product should support instead.
      placeholder: What should have happened, or what would a better steady-state look like?
    validations:
      required: true

  - type: dropdown
    id: product_first
    attributes:
      label: Should this be addressed in the shipped product first?
      description: Choose the best current judgment.
      options:
        - "Yes: this looks like a package or contract improvement"
        - "Maybe: repo-specific symptom, but product changes may help"
        - "No: this appears repo-local"
    validations:
      required: true

  - type: textarea
    id: product_reasoning
    attributes:
      label: Product-first reasoning
      description: Answer the product question directly when relevant.
      placeholder: Could or should this have been found, prevented, or remediated by the product itself?
    validations:
      required: true

  - type: checkboxes
    id: surfaces
    attributes:
      label: Likely affected surfaces
      description: Select every surface that seems relevant.
      options:
        - label: planning package
        - label: memory package
        - label: repo workflow or instructions
        - label: docs or contract surfaces
        - label: validation or checks
        - label: GitHub workflow or collaboration flow
        - label: unknown yet

  - type: dropdown
    id: planning_target
    attributes:
      label: Best next planning destination
      description: Pick the most likely routing target if known.
      options:
        - TODO.md candidate
        - ROADMAP.md candidate
        - docs/reviews follow-up
        - package backlog item
        - documentation-only follow-up
        - not sure yet
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      description: Choose the narrowest honest level.
      options:
        - Blocking current work
        - Should be scheduled soon
        - Useful follow-up, not urgent
        - Exploratory signal only
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Bounded scope
      description: Keep the likely next step small and concrete.
      placeholder: What is the smallest useful next action or plan slice?
    validations:
      required: true

