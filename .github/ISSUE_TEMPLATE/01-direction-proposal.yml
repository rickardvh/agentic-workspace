name: Direction / Proposal
description: File a new product direction, architectural proposal, or bounded planning slice.
title: "[Workspace]: "
labels:
  - planning
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new directions, architectural proposals, or bounded slices.

        Use GitHub sub-issues for parent/child hierarchy.
        This form is about **issue kind**, not hierarchy level.

  - type: dropdown
    id: issue_kind
    attributes:
      label: Issue kind
      description: What kind of planning issue is this?
      options:
        - Parent direction / lane
        - Child slice / bounded follow-on
        - Cross-cutting proposal
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue or lane
      description: If this belongs under an existing parent, link it here (for example #270).
      placeholder: "#270"
    validations:
      required: false

  - type: textarea
    id: problem_intent
    attributes:
      label: Problem / intent
      description: What is missing, mis-shaped, or too weak today?
      placeholder: Describe the real problem and intended direction.
    validations:
      required: true

  - type: textarea
    id: intended_outcome
    attributes:
      label: Intended outcome
      description: What should become true if this lands?
      placeholder: Describe the desired capability or improvement.
    validations:
      required: true

  - type: textarea
    id: larger_picture
    attributes:
      label: How it fits the larger picture
      description: Which larger direction, system thesis, or product lane does this serve?
      placeholder: Explain why this matters beyond the local change.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope?
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance / success signal
      description: How would we know this direction has been meaningfully advanced?
      placeholder: Define what better looks like.
    validations:
      required: true

  - type: textarea
    id: final_satisfaction
    attributes:
      label: Final satisfaction
      description: What must be true before this issue is complete, including the final intended state and any blocking gaps?
      placeholder: Describe the final state that closes this issue, not only a useful first slice.
    validations:
      required: true

  - type: textarea
    id: bounded_slice_success
    attributes:
      label: Bounded slice success
      description: What useful partial progress may land while preserving continuation state and larger intent?
      placeholder: Describe a coherent partial slice and how it keeps the remaining work visible.
    validations:
      required: true

  - type: dropdown
    id: partial_pr_may_close
    attributes:
      label: Partial PR may close
      description: Can a partial slice close this issue without satisfying the final intended outcome?
      options:
        - "no"
        - "yes"
    validations:
      required: true

  - type: textarea
    id: required_follow_up_owner
    attributes:
      label: Required follow-up owner
      description: If a partial slice lands, where must remaining work be owned?
      placeholder: Issue, parent lane, planning state, doc, module owner, or none.
    validations:
      required: true

  - type: textarea
    id: required_residual_intent
    attributes:
      label: Required residual intent
      description: What intent must remain open after a partial slice?
      placeholder: Name the remaining product or workflow intent that must not be lost.
    validations:
      required: true

  - type: textarea
    id: evidence_required_for_final_completion
    attributes:
      label: Evidence required for final completion
      description: What proof, review, or acceptance evidence is required before this issue can honestly close?
      placeholder: Name the evidence that proves the final intended state, not only local progress.
    validations:
      required: true

  - type: textarea
    id: planning_expectations
    attributes:
      label: Planning expectations
      description: Any guidance for future slicing, implementation posture, or boundaries.
      placeholder: Keep this compact and operational.
    validations:
      required: false

  - type: textarea
    id: related_references
    attributes:
      label: References
      description: Link related issues, files, documents, PRs, or screenshots.
      placeholder: |
        - #...
        - path/to/file
        - https://...
    validations:
      required: false
