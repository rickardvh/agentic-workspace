name: Review / Friction
description: Report review gaps, trust gaps, dogfooding friction, or product-vs-repo ambiguity.
title: "[Review]: "
labels:
  - review
body:
  - type: markdown
    attributes:
      value: |
        Use this form when the main problem is not a simple bug or a new direction,
        but that the system is too hard to review, trust, continue, hand off, or use cleanly.

  - type: dropdown
    id: issue_kind
    attributes:
      label: Issue kind
      options:
        - Review / trust gap
        - Dogfooding friction
        - Product-vs-repo ambiguity
        - Continuation / handoff friction
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Related issue or lane
      description: If this belongs under an existing lane, link it here.
      placeholder: "#..."
    validations:
      required: false

  - type: textarea
    id: observed_problem
    attributes:
      label: Observed problem
      description: What was hard to inspect, trust, review, continue, or use?
      placeholder: Describe the friction or trust gap concretely.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include issue links, file paths, screenshots, transcripts, or other concrete evidence.
      placeholder: Paste the smallest useful evidence set.
    validations:
      required: true

  - type: dropdown
    id: likely_classification
    attributes:
      label: Likely classification
      description: What kind of problem does this appear to be?
      options:
        - Product-general issue
        - Repo-local adaptation need
        - Mixed / unclear
    validations:
      required: true

  - type: dropdown
    id: product_should_absorb
    attributes:
      label: Should the product absorb this first?
      options:
        - "Yes"
        - "Maybe"
        - "No"
    validations:
      required: true

  - type: textarea
    id: desired_signal
    attributes:
      label: Desired review or workflow signal
      description: What should the system surface, preserve, or make cheaper?
      placeholder: Describe the missing signal, check, or support.
    validations:
      required: true

  - type: textarea
    id: intended_outcome
    attributes:
      label: Intended outcome
      description: Describe the final state that should be true after this issue is complete.
      placeholder: Explain what should become easier after this is addressed.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What observable final-state requirements must be true?
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: non_solutions
    attributes:
      label: Non-solutions
      description: What does not close this issue unless explicitly listed in the acceptance criteria?
      value: |
        The following do not close this issue unless explicitly listed in the acceptance criteria:

        - documenting the problem without changing the affected behavior;
        - adding an inventory without completing the requested change;
        - reclassifying or renaming the current behavior while preserving the old dependency/path;
        - adding a follow-up issue instead of completing the stated outcome;
        - changing tests to accept the current behavior rather than making the intended behavior true.
    validations:
      required: true

  - type: textarea
    id: final_satisfaction
    attributes:
      label: Final satisfaction
      description: What must be true before this issue is complete, including the final review/workflow signal and any blocking gaps?
      placeholder: Describe the final state that closes this review gap.
    validations:
      required: true

  - type: textarea
    id: evidence_required_for_final_completion
    attributes:
      label: Evidence required for final completion
      description: What proof, review, or dogfooding evidence is required before this issue can honestly close?
      placeholder: Name the evidence that proves the final desired signal.
    validations:
      required: true

  - type: textarea
    id: completion_rule
    attributes:
      label: Completion rule
      description: What condition permits a PR to close this issue?
      value: A PR may close this issue only if the intended outcome is true in the ordinary path, not merely documented, inventoried, reclassified, or deferred.
    validations:
      required: true
