version = 1

[rules]
routing_only = [".agentic-workspace/memory/repo/index.md"]
high_level = [".agentic-workspace/memory/repo/index.md"]
canonical_dirs = [
  ".agentic-workspace/memory/repo/domains",
  ".agentic-workspace/memory/repo/invariants",
  ".agentic-workspace/memory/repo/runbooks",
  ".agentic-workspace/memory/repo/mistakes",
  ".agentic-workspace/memory/repo/decisions",
]
task_board_globs = ["TODO.md", "tasks/**", ".github/issues/**"]
core_doc_globs = ["README.md", "docs/**/*.md", "CONTRIBUTING.md", ".github/**/*.md"]
core_doc_exclude_globs = ["AGENTS.md", ".agentic-workspace/memory/repo/**/*.md", ".agentic-workspace/memory/**/*.md"]
forbid_core_docs_depend_on_memory = false

# Bootstrap payload policy:
# - ship repo-memory structure, directory READMEs, machine-readable manifests, and starter templates;
# - do not ship repo-specific notes, runbooks, decisions, or repo-local skills;
# - target repositories create their own durable memory notes from local evidence.

[notes.".agentic-workspace/memory/repo/index.md"]
note_type = "routing"
canonical_home = ".agentic-workspace/memory/repo/index.md"
authority = "canonical"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "required"
subsystems = ["memory-system"]
surfaces = ["routing"]
routes_from = ["AGENTS.md", ".agentic-workspace/memory/repo/**/*.md"]
stale_when = [".agentic-workspace/memory/repo/**/*.md"]
routing_only = true
high_level = true

[notes.".agentic-workspace/memory/repo/domains/README.md"]
note_type = "domain"
canonical_home = ".agentic-workspace/memory/repo/domains/README.md"
authority = "advisory"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["architecture", "routing"]
routes_from = [".agentic-workspace/memory/repo/index.md"]
stale_when = [".agentic-workspace/memory/repo/index.md"]

[notes.".agentic-workspace/memory/repo/invariants/README.md"]
note_type = "invariant"
canonical_home = ".agentic-workspace/memory/repo/invariants/README.md"
authority = "advisory"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["contracts", "architecture"]
routes_from = [".agentic-workspace/memory/repo/index.md"]
stale_when = [".agentic-workspace/memory/repo/index.md"]

[notes.".agentic-workspace/memory/repo/runbooks/README.md"]
note_type = "runbook"
canonical_home = ".agentic-workspace/memory/repo/runbooks/README.md"
authority = "advisory"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["operations", "routing"]
routes_from = [".agentic-workspace/memory/repo/index.md"]
stale_when = [".agentic-workspace/memory/repo/index.md"]

[notes.".agentic-workspace/memory/repo/decisions/README.md"]
note_type = "decision"
canonical_home = ".agentic-workspace/memory/repo/decisions/README.md"
authority = "advisory"
audience = "human+agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system"]
surfaces = ["architecture", "decision"]
routes_from = [".agentic-workspace/memory/repo/index.md"]
stale_when = [".agentic-workspace/memory/repo/index.md"]

[notes.".agentic-workspace/memory/repo/decisions/agent-judgment-over-keyword-matching-2026-06-16.md"]
note_type = "decision"
canonical_home = ".agentic-workspace/memory/repo/decisions/agent-judgment-over-keyword-matching-2026-06-16.md"
authority = "advisory"
audience = "agent"
canonicality = "candidate_for_promotion"
task_relevance = "optional"
subsystems = ["workspace", "memory-system", "verification"]
surfaces = ["routing", "skills", "memory", "verification", "closeout", "delegation"]
routes_from = [
  ".agentic-workspace/memory/repo/index.md",
  ".agentic-workspace/memory/repo/current/routing-feedback.md",
]
stale_when = [
  ".agentic-workspace/WORKFLOW.md",
  "src/agentic_workspace/contracts/skill_specs.json",
  "src/agentic_workspace/workspace_runtime_primitives.py",
  "packages/verification/src/repo_verification_bootstrap/runtime_primitives.py",
]
memory_role = "durable_truth"
promotion_target = ".agentic-workspace/WORKFLOW.md and skill/report contracts that expose agent-owned decision support"
promotion_trigger = "Any workflow feature proposes prompt keyword matching as decision authority, or Memory/Verification/delegation guidance is updated."
retention_after_promotion = "shrink"
preferred_remediation = "skill"
elimination_target = "promote"
config_treatment = "promote"
config_note = "This is a core AW agent-judgment rule, not repo-local preference."

[notes.".agentic-workspace/memory/repo/current/routing-feedback.md"]
note_type = "current"
canonical_home = ".agentic-workspace/memory/repo/current/routing-feedback.md"
authority = "advisory"
audience = "agent"
canonicality = "agent_only"
task_relevance = "optional"
subsystems = ["memory-system", "workspace"]
surfaces = ["routing", "dogfooding"]
routes_from = [".agentic-workspace/memory/repo/index.md", ".agentic-workspace/memory/repo/runbooks/dogfooding-feedback-routing.md"]
stale_when = [".agentic-workspace/memory/repo/index.md", ".agentic-workspace/memory/repo/runbooks/dogfooding-feedback-routing.md"]
memory_role = "improvement_signal"
promotion_target = "planning closeout transactionality, diagnostics, or tests"
promotion_trigger = "Promote when closeout blocker handling is next touched or when another run hits partial-write cleanup friction."
retention_after_promotion = "shrink"
preferred_remediation = "test"
improvement_note = "Make planning closeout validate blockers before writing normalized archive fields, or give a direct rerun path that prevents contradictory residue."
elimination_target = "shrink"
config_treatment = "no_action"
config_note = "This is closeout command behavior, not repo-local policy."
retention_justification = "Keep a compact signal until closeout blocker handling is improved or explicitly dismissed."
