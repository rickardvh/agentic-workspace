interface:
  display_name: "Memory Upgrade"
  short_description: "Upgrade the checked-in memory scaffold for this repo."
  default_prompt: "Use $memory-upgrade to upgrade memory for the current repository. Prefer `agentic-workspace upgrade --target <repo> --modules memory`. If the root workspace command cannot run, stop and report that package-local Memory debugging is required. Do not rewrite repo-owned notes unless explicitly asked."
