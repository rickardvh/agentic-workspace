interface:
  display_name: "Memory Upgrade"
  short_description: "Upgrade the checked-in memory scaffold for this repo."
  default_prompt: "Use $memory-upgrade to upgrade memory for the current repository. Prefer `agentic-memory upgrade --target <repo>` when the CLI is on PATH; otherwise use the recorded source with `uvx --from <recorded-source> agentic-memory upgrade --target <repo>`, or `pipx run --spec <recorded-source> agentic-memory upgrade --target <repo>` if `uvx` is unavailable. Do not rewrite repo-owned notes unless explicitly asked."
