# Agentic Workspace managed config.
# Edit this file directly only when changing repo-owned policy.
# Reference: .agentic-workspace/docs/workspace-config-contract.md
# Check resolved config: uv run agentic-workspace config --target . --format json

schema_version = 1

[modules]
enabled = ["planning", "memory", "verification"]

[workspace]
agent_instructions_file = "AGENTS.md"
workflow_artifact_profile = "repo-owned"
improvement_latitude = "proactive"
optimization_bias = "agent-efficiency"
advanced_features = ["review_artifacts", "external_adapters"]
# Keep a spawned/linked worktree on the caller's already-active environment.
# Without --active, uv ignores VIRTUAL_ENV when the worktree has a different
# project path, creates a second .venv, and buries the first AW decision behind
# installation output.
cli_invoke = "uv run --active python scripts/run_agentic_workspace.py"

[assurance]
default_level = "medium"
agent_may_escalate = true
agent_may_deescalate = false
strict_closeout = true
test_data_policy = {}

[assurance.proof_profiles.workspace_behavior]
required_commands = []
optional_commands = ["uv run python scripts/run_agentic_workspace.py proof --target . --current --format json"]
review_aids = ["Use focused domain proof lanes for executable behavior evidence; broad workspace validation requires an explicit broad route or escalation reason."]

[assurance.proof_profiles.verification_behavior]
required_commands = ["uv run pytest packages/verification/tests -q"]
optional_commands = ["uv run python scripts/run_agentic_workspace.py report --target . --section verification --format json"]
review_aids = ["Confirm Verification reports facts and questions without making agent-owned proof decisions."]

[assurance.proof_profiles.test_evidence_change]
required_commands = ["uv run python scripts/run_agentic_workspace.py report --target . --section verification --format json"]
optional_commands = ["uv run python scripts/run_agentic_workspace.py report --target . --section verification --format json"]
review_aids = ["Record or inspect the Verification proof-decision route when ordinary tests grow, shrink, or move."]

[assurance.requirements.test_evidence_change_decision]
level = "high"
applies_to_paths = ["tests/**", "packages/**/tests/**", "docs/maintainer/test-knowledge-inventory.md", "docs/maintainer/testing-strategy.md"]
applies_to_task_markers = ["test reduction", "regression test", "ordinary test", "conformance test", "proof decision"]
authority_refs = ["docs/maintainer/testing-strategy.md", "docs/maintainer/test-knowledge-inventory.md"]
required_evidence = ["verification_proof_decision_review"]
proof_profile = "test_evidence_change"
review_owner = "maintainer"
force = "required-before-closeout"
blocking_claims = ["claim-work-complete", "close-parent-lane"]
notes = "Changing ordinary test evidence should explain the trust question and replacement/retention decision instead of relying on test count alone."

[assurance.requirements.closeout_intent_satisfaction]
level = "high"
applies_to_paths = ["packages/planning/src/**/archive*.py", "packages/planning/src/**/closeout*.py", "packages/planning/tests/**/test_archive*.py", "tests/test_workspace_summary_cli.py", "tests/test_workspace_implement_cli.py"]
applies_to_task_markers = ["closeout", "intent satisfaction", "parent lane", "completion claim"]
authority_refs = [".agentic-workspace/OWNERSHIP.toml#subsystems.planning", ".agentic-workspace/planning/skills/planning-closeout-trust/SKILL.md"]
required_evidence = ["intent_satisfaction_review", "closeout_trust_review"]
proof_profile = "workspace_behavior"
workflow_obligation_refs = ["commit_after_proof"]
review_owner = "maintainer"
force = "required-before-closeout"
blocking_claims = ["claim-work-complete", "close-parent-lane"]
notes = "Planning and closeout behavior changes need explicit intent-satisfaction and residue-routing evidence before broad completion claims."

[assurance.subsystem_profiles.workspace-cli-runtime]
assurance_level = "high"
scope_refs = ["ownership.subsystems.workspace-cli-runtime"]
requirement_refs = [".agentic-workspace/OWNERSHIP.toml#subsystems.workspace-cli-runtime"]
required_evidence = ["workspace_runtime_proof", "tiny_surface_compatibility_review"]
proof_profile = "workspace_behavior"
workflow_obligation_refs = ["adapter_surface_refresh"]
review_owner = "maintainer"
force = "required-before-closeout"
blocked_without_evidence = ["claim-work-complete"]
claim_boundary = "workspace-runtime-routing"
notes = "Workspace runtime routing changes need focused runtime proof and compact-output compatibility review before broad completion claims."

[assurance.domain_proof_lanes.workspace_proof_runtime]
purpose = "Focused root Workspace proof-routing behavior."
applies_to_paths = ["src/agentic_workspace/workspace_runtime_proof.py", "tests/test_workspace_proof_cli.py"]
commands = ["uv run pytest tests/test_workspace_proof_cli.py -k changed_selector -q"]
review_aids = ["Confirm the selected proof route, narrowness packet, and escalation fields match the changed proof behavior."]
evidence_concepts = ["root-workspace-proof-routing", "focused-serial-proof"]
proof_profiles = ["workspace_behavior"]
authority_refs = [".agentic-workspace/config.toml", "docs/maintainer/testing-strategy.md"]
escalation = ["the change crosses package, generated-command, lifecycle, or closeout behavior boundaries", "the focused selector does not exercise the changed proof behavior"]
escalation_conditions = ["cross-owner", "cross-claim-boundary", "focused-route-insufficient"]
claim_boundary = "focused-workspace-proof-required-before-runtime-routing-claim"
owner = "workspace-cli-runtime"
route_role = "behavior"
precedence = "60"
allowed_composition = ["maintenance", "evidence"]
notes = "This lane is the first focused replacement for generic workspace_behavior proof on proof-router changes."

[assurance.domain_proof_lanes.proof_route_authority]
purpose = "Focused maintenance route for repo-owned proof-routing authority."
applies_to_paths = [".agentic-workspace/config.toml", ".agentic-workspace/verification/manifest.toml", ".agentic-workspace/planning/state.toml", ".agentic-workspace/planning/execplans/issue-2333-serial-focused-proof.plan.json", ".agentic-workspace/planning/execplans/issue-2334-proof-friction-escalation.plan.json", "Makefile", "src/agentic_workspace/contract_tooling.py", "src/agentic_workspace/contracts/python_contract_consumption.json", "src/agentic_workspace/workspace_runtime_proof.py", "tests/test_workspace_proof_cli.py"]
commands = ["uv run pytest tests/test_workspace_proof_cli.py -k \"focused_domain_route or missing_focused_route or tiny_profile_returns_next_validation_action\" -q", "uv run python scripts/check/check_contract_tooling_surfaces.py --quiet-success", "uv run python scripts/check/check_structured_file_inventory.py --quiet-success"]
manual_evidence = ["proof_route_authority_review"]
review_aids = ["Confirm focused routes remain declared in existing config and Verification authority rather than in a standalone parallel matrix."]
evidence_concepts = ["root-workspace-proof-routing", "route-maintenance", "focused-serial-proof"]
proof_profiles = ["workspace_behavior", "test_evidence_change"]
authority_refs = [".agentic-workspace/config.toml", ".agentic-workspace/verification/manifest.toml", "docs/maintainer/testing-strategy.md"]
escalation = ["route authority changes cannot be covered by focused proof-router tests", "maintainer explicitly requests broad workspace validation"]
escalation_conditions = ["explicit-request", "focused-route-insufficient"]
claim_boundary = "proof-route-authority-review-required-before-route-claim"
owner = "workspace-cli-runtime"
route_role = "maintenance"
precedence = "90"
allowed_composition = ["behavior", "evidence", "broad"]

[assurance.domain_proof_lanes.session_logging_friction]
purpose = "Focused session-log friction evidence and proof-route maintenance behavior."
applies_to_paths = ["src/agentic_workspace/session_logging.py", "tests/test_workspace_session_logging.py"]
commands = ["uv run pytest tests/test_workspace_session_logging.py -k slow_commands -q"]
review_aids = ["Confirm session-log friction candidates remain non-authoritative evidence that can feed proof-route refinement."]
evidence_concepts = ["route-maintenance", "focused-serial-proof"]
proof_profiles = ["workspace_behavior"]
authority_refs = [".agentic-workspace/config.toml", "docs/maintainer/testing-strategy.md"]
escalation = ["session logging changes alter closeout, Memory capture, or proof-route authority rather than friction evidence only"]
escalation_conditions = ["focused-route-insufficient"]
claim_boundary = "session-friction-proof-required-before-route-maintenance-claim"
owner = "workspace-cli-runtime"
route_role = "maintenance"
precedence = "90"
allowed_composition = ["behavior", "evidence", "broad"]

[assurance.domain_proof_lanes.memory_package_behavior]
purpose = "Focused Memory package behavior."
applies_to_paths = ["packages/memory/src/**", "packages/memory/tests/**"]
commands = ["make test-memory"]
review_aids = ["Confirm the change is package-local Memory behavior rather than root orchestration."]
evidence_concepts = ["memory-package-behavior", "package-local-proof"]
proof_profiles = ["workspace_behavior"]
authority_refs = [".agentic-workspace/config.toml", "packages/memory/AGENTS.md"]
escalation = ["the change crosses root workspace orchestration or installed payload boundaries"]
escalation_conditions = ["cross-owner", "cross-claim-boundary"]
claim_boundary = "focused-memory-proof-required-before-package-claim"
owner = "memory"
route_role = "behavior"
precedence = "50"
allowed_composition = ["maintenance", "evidence"]

[assurance.domain_proof_lanes.planning_package_behavior]
purpose = "Focused Planning package behavior."
applies_to_paths = ["packages/planning/src/**", "packages/planning/tests/**"]
commands = ["make test-planning"]
review_aids = ["Confirm the change is package-local Planning behavior rather than root orchestration."]
evidence_concepts = ["planning-package-behavior", "package-local-proof"]
proof_profiles = ["workspace_behavior"]
authority_refs = [".agentic-workspace/config.toml", "packages/planning/AGENTS.md"]
escalation = ["the change crosses root workspace orchestration, closeout trust, or installed payload boundaries"]
escalation_conditions = ["cross-owner", "cross-claim-boundary", "high-risk-requirement"]
claim_boundary = "focused-planning-proof-required-before-package-claim"
owner = "planning"
route_role = "behavior"
precedence = "50"
allowed_composition = ["maintenance", "evidence"]

[assurance.domain_proof_lanes.verification_package_behavior]
purpose = "Focused Verification package behavior."
applies_to_paths = ["packages/verification/src/**", "packages/verification/tests/**"]
commands = ["make test-verification"]
review_aids = ["Confirm Verification reports facts and questions without becoming the proof decision owner."]
evidence_concepts = ["verification-package-behavior", "package-local-proof"]
proof_profiles = ["verification_behavior"]
authority_refs = [".agentic-workspace/config.toml", ".agentic-workspace/verification/manifest.toml"]
escalation = ["the change alters root proof selection, assurance policy, or generated package behavior"]
escalation_conditions = ["cross-owner", "cross-claim-boundary"]
claim_boundary = "focused-verification-proof-required-before-package-claim"
owner = "verification"
route_role = "behavior"
precedence = "50"
allowed_composition = ["maintenance", "evidence"]

[assurance.domain_proof_lanes.generated_command_packages]
purpose = "Focused generated command package and adapter conformance."
applies_to_paths = ["src/agentic_workspace/contracts/command_package_ir.json", "scripts/check/check_generated_command_packages.py", "scripts/generate/generate_command_packages.py", "scripts/generate/workspace_command_generation.py", "generated/workspace/python/**", "generated/workspace/typescript/**", "generated/planning/python/**", "generated/planning/typescript/**", "generated/memory/python/**", "generated/memory/typescript/**", "generated/verification/python/**", "generated/verification/typescript/**"]
commands = ["uv run python scripts/check/check_generated_command_packages.py --require-node", "uv run python scripts/check/check_generated_command_packages.py --conformance --require-node"]
review_aids = ["Use the Verification generated-adapter protocol to decide whether Docker proof is required or an environment gap must be recorded."]
evidence_concepts = ["generated-package-freshness", "generated-adapter-conformance"]
proof_profiles = ["workspace_behavior"]
authority_refs = [".agentic-workspace/verification/manifest.toml#proof_routes.generated_adapter_conformance", "src/agentic_workspace/contracts/command_package_ir.json"]
escalation = ["Docker packaging, runtime handoff, command-generation internals, or cross-target behavior changed"]
escalation_conditions = ["cross-owner", "cross-claim-boundary", "high-risk-requirement"]
claim_boundary = "focused-generated-adapter-proof-required-before-generated-package-claim"
owner = "workspace-cli-runtime"
route_role = "behavior"
precedence = "55"
allowed_composition = ["maintenance", "evidence"]

[assurance.domain_proof_lanes.test_evidence_decision]
purpose = "Focused test-evidence change review."
applies_to_paths = ["tests/**", "packages/**/tests/**", "docs/maintainer/testing-strategy.md", "docs/maintainer/test-knowledge-inventory.md"]
commands = ["uv run python scripts/run_agentic_workspace.py report --target . --section verification --format json"]
manual_evidence = ["verification_proof_decision_review", "test_evidence_owner_review"]
review_aids = ["Record why retained, added, merged, converted, or pruned evidence is sufficient under the maintainer testing strategy."]
evidence_concepts = ["test-evidence-decision", "route-maintenance"]
assurance_requirement_refs = ["test_evidence_change_decision"]
proof_profiles = ["test_evidence_change"]
authority_refs = [".agentic-workspace/verification/manifest.toml#proof_routes.test_evidence_decision", "docs/maintainer/testing-strategy.md"]
escalation = ["the test evidence change crosses product behavior or generated adapter boundaries"]
escalation_conditions = ["cross-owner", "cross-claim-boundary", "focused-route-insufficient"]
claim_boundary = "test-evidence-disposition-required-before-closeout"
owner = "verification"
route_role = "evidence"
precedence = "80"
allowed_composition = ["behavior", "maintenance", "broad"]

[assurance.domain_proof_lanes.workspace_broad_suite]
purpose = "Explicit broad workspace validation route."
applies_to_task_markers = ["full workspace validation", "broad workspace proof", "cross-cutting high-risk claim"]
commands = [
  "make test-workspace-cli",
  "make test-workspace-proof",
  "make test-workspace-session-review",
  "make test-workspace-contracts",
  "make test-workspace-generated-release",
  "make test-workspace-integration",
  "make lint-workspace",
]
review_aids = ["Name the structured escalation reason before treating this broad route as the acceptance boundary."]
evidence_concepts = ["broad-workspace-validation", "explicit-escalation"]
proof_profiles = ["workspace_behavior"]
authority_refs = [".agentic-workspace/config.toml", "docs/maintainer/testing-strategy.md"]
escalation = ["cross-cutting behavior lacks sufficient focused coverage", "maintainer or user explicitly requested broad proof", "high-risk claim requires broad root evidence"]
escalation_conditions = ["cross-owner", "cross-claim-boundary", "focused-route-insufficient", "explicit-request", "high-risk-requirement"]
claim_boundary = "explicit-broad-escalation-required"
owner = "workspace-cli-runtime"
route_role = "broad"
precedence = "10"
allowed_composition = ["behavior", "maintenance", "evidence"]

[assurance.requirements.model_harness_evidence]
level = "high"
applies_to_paths = ["tools/model-cli-harness/**", "scripts/model_cli_harness/**", "docs/maintainer/test-knowledge-inventory.md"]
applies_to_task_markers = ["model cli harness", "harness scorer", "test knowledge inventory"]
authority_refs = [".agentic-workspace/OWNERSHIP.toml#subsystems.model-cli-harness", "docs/maintainer/test-knowledge-inventory.md"]
required_evidence = ["model_harness_scorer_proof", "test_knowledge_inventory_review"]
proof_profile = "test_evidence_change"
review_owner = "maintainer"
force = "required-before-closeout"
blocking_claims = ["claim-work-complete"]
notes = "Model harness and test-knowledge changes need scorer proof and inventory review before broad completion claims."

[cli_compatibility]
enforcement = "advisory"
source_classes = ["source-checkout"]
target_relations = ["inside-target"]

[payload]
target_release = "source-current"
minimum_capabilities = ["installed-state-sync-v2"]
policy = "required-before-work"
dogfood_latest = true

[system_intent]
sources = ["SYSTEM_INTENT.md", "README.md"]
preferred_source = "SYSTEM_INTENT.md"

[update.modules.planning]
source_type = "git"
source_ref = "git+https://github.com/rickardvh/agentic-workspace@master#subdirectory=packages/planning"
source_label = "agentic-planning monorepo master"
recommended_upgrade_after_days = 30

[update.modules.memory]
source_type = "git"
source_ref = "git+https://github.com/rickardvh/agentic-workspace@master#subdirectory=packages/memory"
source_label = "agentic-memory monorepo master"
recommended_upgrade_after_days = 30

[workflow_obligations.adapter_surface_refresh]
summary = "Refresh adapter surfaces when structured startup, routing, or query contracts change."
stage = "before-claiming-completion"
force = "required-before-closeout"
scope_tags = ["workspace", "planning", "adapter-surfaces"]
commands = [
  "make maintainer-surfaces",
  "uv run python scripts/check/check_planning_surfaces.py",
]
review_hint = "Use when AGENTS.md, generated agent docs, routing contracts, or workspace query surfaces changed."

[workflow_obligations.boundary_and_context_discipline]
summary = "Keep package boundaries explicit and start from checked-in surfaces before broad rereads."
stage = "pre-work"
force = "recommended"
scope_tags = ["workspace", "planning", "memory", "package-boundaries"]
commands = [
  "uv run agentic-workspace report --target . --format json",
  "uv run agentic-workspace ownership --target . --format json",
]
review_hint = "Do not start coding from chat context alone when checked-in files already answer the question, and do not bulk-read all planning surfaces."

[workflow_obligations.commit_after_proof]
summary = "Commit only after the bounded proof lane passes and the active execplan reflects the current milestone."
stage = "before-commit"
force = "recommended"
scope_tags = ["workspace", "planning", "memory"]
commands = [
  "uv run agentic-workspace summary --format json",
  "git status --short",
]
review_hint = "Treat this as a closeout/readiness gate, not as a substitute for task-specific validation."

[workflow_obligations.dogfooding_lane_closeout]
summary = "At the end of each lane, and whenever actionable friction appears during implementation, run a dogfooding review and route what could have been safer, cheaper, or more efficient."
stage = "closeout"
force = "required-before-closeout"
scope_tags = [
  "workspace",
  "planning",
  "memory",
  "dogfooding",
  "self-improvement",
]
commands = [
  "uv run agentic-workspace report --target . --section workflow_obligations --format json",
  "uv run agentic-workspace report --target . --section closeout_trust --format json",
  "uv run agentic-workspace reconcile --format json",
  "uv run agentic-workspace skills --target . --task \"dogfooding closeout review\" --format json",
]
review_hint = "Do this without waiting for explicit instruction. Before claiming a lane complete, separate validation success, issue completion, intent satisfaction, and total operating-cost direction; consume improvement_signal_candidates, fix blockers immediately, create narrow issues for durable friction, and promote reusable knowledge to Memory only when it prevents rediscovery. Surface actionable findings clearly in the final answer."

[workflow_obligations.startup_first_contact_routing]
summary = "Use the compact start query before opening raw planning or routing docs; add config, summary, or preflight only when the start answer leaves that detail unresolved."
stage = "pre-work"
force = "recommended"
scope_tags = ["workspace", "startup", "routing", "planning"]
commands = ["uv run agentic-workspace start --task \"<task>\" --format json"]
review_hint = "Open raw planning state, an active execplan, config, preflight, or deeper routing docs only when the compact start answer points there."

[workflow_obligations.system_intent_refresh]
summary = "Refresh declared system-intent sources and the compiled interpretation when higher-level direction changes materially."
stage = "review"
force = "recommended"
scope_tags = ["workspace", "system-intent"]
commands = [
  "uv run agentic-workspace system-intent --target . --sync --format json",
]
review_hint = "Treat system intent as directional input and keep the compiled declaration aligned without turning it into active task state."
