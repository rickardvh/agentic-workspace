# Agentic Workspace managed config.
# Edit this file directly only when changing repo-owned policy.
# Reference: .agentic-workspace/docs/workspace-config-contract.md
# Check resolved config: uv run agentic-workspace config --target . --format json

schema_version = 1

[workspace]
default_preset = "full"
agent_instructions_file = "AGENTS.md"
workflow_artifact_profile = "repo-owned"
improvement_latitude = "proactive"
optimization_bias = "agent-efficiency"
advanced_features = ["review_artifacts", "external_adapters"]
cli_invoke = "uv run agentic-workspace"

[assurance]
default_level = "medium"
agent_may_escalate = true
agent_may_deescalate = false
strict_closeout = true
proof_profiles = {}
test_data_policy = {}

[cli_compatibility]
enforcement = "advisory"
source_classes = ["source-checkout"]
target_relations = ["inside-target"]

[system_intent]
sources = ["SYSTEM_INTENT.md", "README.md"]
preferred_source = "SYSTEM_INTENT.md"

[update.modules.planning]
source_type = "git"
source_ref = "git+https://github.com/rickardvh/agentic-workspace@master#subdirectory=packages/planning"
source_label = "agentic-planning monorepo master"
recommended_upgrade_after_days = 30

[update.modules.memory]
source_type = "git"
source_ref = "git+https://github.com/rickardvh/agentic-workspace@master#subdirectory=packages/memory"
source_label = "agentic-memory monorepo master"
recommended_upgrade_after_days = 30

[workflow_obligations.adapter_surface_refresh]
summary = "Refresh adapter surfaces when structured startup, routing, or query contracts change."
stage = "before-claiming-completion"
force = "required-before-closeout"
scope_tags = ["workspace", "planning", "adapter-surfaces"]
commands = [
  "make maintainer-surfaces",
  "uv run python scripts/check/check_planning_surfaces.py",
]
review_hint = "Use when AGENTS.md, llms.txt, generated agent docs, routing contracts, or workspace query surfaces changed."

[workflow_obligations.boundary_and_context_discipline]
summary = "Keep package boundaries explicit and start from checked-in surfaces before broad rereads."
stage = "pre-work"
force = "recommended"
scope_tags = ["workspace", "planning", "memory", "package-boundaries"]
commands = [
  "uv run agentic-workspace report --target . --format json",
  "uv run agentic-workspace ownership --target . --format json",
]
review_hint = "Do not start coding from chat context alone when checked-in files already answer the question, and do not bulk-read all planning surfaces."

[workflow_obligations.commit_after_proof]
summary = "Commit only after the bounded proof lane passes and the active execplan reflects the current milestone."
stage = "before-commit"
force = "recommended"
scope_tags = ["workspace", "planning", "memory"]
commands = [
  "uv run agentic-workspace summary --format json",
  "git status --short",
]
review_hint = "Treat this as a closeout/readiness gate, not as a substitute for task-specific validation."

[workflow_obligations.dogfooding_lane_closeout]
summary = "At the end of each lane, and whenever actionable friction appears during implementation, run a dogfooding review and route what could have been safer, cheaper, or more efficient."
stage = "closeout"
force = "required-before-closeout"
scope_tags = [
  "workspace",
  "planning",
  "memory",
  "dogfooding",
  "self-improvement",
]
commands = [
  "uv run agentic-workspace report --target . --section workflow_obligations --format json",
  "uv run agentic-workspace report --target . --section closeout_trust --format json",
  "uv run agentic-workspace reconcile --format json",
  "uv run agentic-workspace skills --target . --task \"dogfooding closeout review\" --format json",
]
review_hint = "Do this without waiting for explicit instruction. Before claiming a lane complete, separate validation success, issue completion, intent satisfaction, and total operating-cost direction; consume improvement_signal_candidates, fix blockers immediately, create narrow issues for durable friction, and promote reusable knowledge to Memory only when it prevents rediscovery. Surface actionable findings clearly in the final answer."

[workflow_obligations.startup_first_contact_routing]
summary = "Use the compact start query before opening raw planning or routing docs; add config, summary, or preflight only when the start answer leaves that detail unresolved."
stage = "pre-work"
force = "recommended"
scope_tags = ["workspace", "startup", "routing", "planning"]
commands = ["uv run agentic-workspace start --task \"<task>\" --format json"]
review_hint = "Open raw planning state, an active execplan, config, preflight, or deeper routing docs only when the compact start answer points there."

[workflow_obligations.system_intent_refresh]
summary = "Refresh declared system-intent sources and the compiled interpretation when higher-level direction changes materially."
stage = "review"
force = "recommended"
scope_tags = ["workspace", "system-intent"]
commands = [
  "uv run agentic-workspace system-intent --target . --sync --format json",
]
review_hint = "Treat system intent as directional input and keep the compiled declaration aligned without turning it into active task state."
