  { type = "lane", id = "agent-created-aids", maturity = "candidate", status = "next", priority = "P0", refs = "GitHub #620", title = "Encourage agents to create bounded aids for their own work", outcome = "Make it explicit that agents may create scripts, runbooks, templates, prompts, check wrappers, compact command runners, and other bounded helpers when they reduce repeated work, parsing cost, handoff cost, or error risk.", why_now = "This is direct dogfooding evidence from recent lanes: the package has agent-aid storage, local integration areas, agent-efficiency latitude, and COMPACT_RUN, but agents still tolerate repeated friction instead of creating aids.", promotion_signal = "Promote when repeated friction appears during implementation or closeout; start by surfacing where to create local-only or checked-in candidate aids and how to preserve compact output plus inspectable evidence without creating hidden workflow authority.", suggested_first_slice = "#620: expose the general agent-created-aid trigger and use COMPACT_RUN-style command helpers as the first concrete example." },
  { type = "lane", id = "agent-runtime-integration-shims", maturity = "candidate", status = "deferred", priority = "P1", refs = "GitHub #621", title = "Add local integration shim path for agent-runtime artifacts", outcome = "Define a local-only integration-shim pattern for bridging agent runtime artifacts such as internal plans, check bundles, and handoff state into Agentic Workspace surfaces without creating shared authority.", why_later = "This is broader than #620 and should follow the narrower compact-helper path so it can reuse the same compact output, log, metadata, and promotion model.", promotion_signal = "Promote after #620 lands or when an agent runtime artifact repeatedly needs conversion into planning records, candidate aids, or compact contract shapes.", suggested_first_slice = "#621: document and surface a local-only shim shape with compact output, inspectable artifacts, metadata, and promotion boundaries." },
