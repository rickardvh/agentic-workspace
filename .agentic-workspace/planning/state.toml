  { id = "config-aware-operating-loop-handshakes", title = "Config-aware operating-loop handshakes", priority = "first", issues = ["#267", "#268"], outcome = "Make Planning and Memory ask materially relevant config questions at the moments that shape execution, signal treatment, cleanup, and closeout so config behaves like part of the operating loop instead of ambient advice.", reason = "The first slice now ships compact planning-side config pull/compliance fields plus memory-side config treatment metadata for improvement signals, but the lane still needs ordinary-use proof about whether those prompts are actually enough to catch config bypass and ambiguous note treatment.", promotion_signal = "Promote when agents still miss material config at startup or closeout, when config treatment remains ambiguous in memory signals, or when review keeps surfacing config bypass without a compact lower-trust follow-on.", suggested_first_slice = "Dogfood the new planning and memory handshake fields on a real bounded task, then tighten lower-trust review or reporting only if config bypass or underspecified treatment still slips through." },
  { id = "memory-recurring-friction-improvement-pressure", title = "Memory recurring-friction improvement pressure", priority = "second", issues = ["#263"], outcome = "Preserve lightweight recurring-friction evidence in Memory or adjacent durable surfaces so repeated package failures accumulate visible improvement pressure without turning every annoyance into backlog.", reason = "The first slice now ships a recurring-friction ledger and doctor-side promotion pressure, but the lane still needs real ordinary-use proof about whether the new path is cheap enough and whether promotion/reporting follow-through should tighten around it.", promotion_signal = "Promote when repeated package friction still disappears, when the new ledger proves too awkward for ordinary use, or when repeated entries show the package should promote stronger remediation automatically.", suggested_first_slice = "Dogfood the new recurring-friction ledger through at least one real repeated signal and tighten promotion or reporting only if the evidence path still leaks or stays too manual." },
