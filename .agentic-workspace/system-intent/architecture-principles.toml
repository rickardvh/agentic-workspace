kind = "agentic-workspace/architecture-principles/v1"
owner = "repo-system-intent"
authority = "SYSTEM_INTENT.md and issue-approved maintainer direction"
relationship_to_system_intent = "Architecture principles are scoped, routable projections of durable system intent. They do not replace SYSTEM_INTENT.md."

[[principles]]
id = "non-enum-keyword-routing"
title = "Do not infer workflow authority from non-enum keyword matches"
authority = "repo-system-intent"
owner = "workspace-runtime"
summary = "AW must not infer routing, ownership, proof selection, delegation, Memory storage, or workflow state from arbitrary prose marker phrases, filenames, executable names, or package-owned keyword tables."
allowed_sources = [
  "explicit structured facts",
  "AW-owned enum labels",
  "configuration",
  "manifest metadata",
  "planning state",
  "generated contracts",
  "learned host or local Memory surfaced as owner evidence"
]
forbidden_sources = [
  "arbitrary prose marker phrases",
  "filename substring authority",
  "executable-name substring authority",
  "package-owned keyword tables used as routing policy"
]
affected_decisions = [
  "routing",
  "ownership",
  "proof-selection",
  "delegation",
  "memory-routing",
  "memory-capture",
  "workflow-state",
  "static-guardrail-design"
]
path_globs = [
  "src/agentic_workspace/workspace_runtime_primitives.py",
  "src/agentic_workspace/config.py",
  "src/agentic_workspace/reporting_support.py",
  "scripts/check/check_contract_tooling_surfaces.py",
  "packages/memory/src/repo_memory_bootstrap/**/*.py",
  "packages/planning/src/repo_planning_bootstrap/**/*.py",
  "packages/verification/src/repo_verification_bootstrap/**/*.py"
]
guardrail_refs = [
  "docs/maintainer/non-enum-keyword-routing-audit.json"
]
proof_expectation = "For matching runtime work, closeout must state whether the principle was preserved or whether the human owner explicitly re-scoped it."
