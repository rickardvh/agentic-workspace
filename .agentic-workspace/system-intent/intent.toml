schema_version = 1
kind = "agentic-workspace/system-intent/v1"
summary = "Agentic Workspace should stay a quiet, repo-native, portable continuity and execution layer that preserves human intent, keeps bounded work cheap to continue and verify, makes weaker agents safer and stronger reasoning more reusable, turns repeated friction into product improvement, and lowers total operating cost without becoming a visible framework or a second source of truth."
governing_intents = ["Preserve only the context that is expensive to rediscover and necessary for safe continuation.", "Keep human-owned why separate from system-shaped what and implementation-level how.", "Make weaker agents safer and spend stronger reasoning on judgment, shaping, review, and recovery rather than orchestration waste.", "Prefer compact queryable state, declared config, and normalized operational mirrors over prose-first operation whenever one structured answer is enough.", "Reduce total successful-completion cost across restart, handoff, review, and proof loops.", "Stay quiet, repo-native, low-residue, and sharply bounded in ownership.", "Keep package contracts portable across host repos, languages, agents, vendors, and local dogfooding environments.", "Convert repeated steering, proof confusion, handoff repair, context overload, or late failure into product improvement signals.", "Make correct package-surface construction cheap by design so validation confirms rather than teaches shape."]
anti_intents = ["Do not become a visible workflow framework the user must consciously operate.", "Do not grow a surface maze where every good idea becomes another durable file or command.", "Do not optimize one local step while making the overall loop heavier.", "Do not let package-owned and repo-owned artifacts blur into ambiguous authority.", "Do not let this repo's current language, tooling, structure, or agent preferences become hidden universal product assumptions.", "Do not treat current local tooling preferences as durable package requirements without explicit justification."]
decision_tests = ["Favor work that preserves human intent more faithfully across time.", "Favor work that makes bounded execution cheaper to start, continue, hand off, review, or finish.", "Favor work that removes, compresses, or backgrounds visible residue instead of adding new first-line surfaces.", "Favor work that sharpens ownership, treats materially relevant config and mirrors as authority, and makes important operating choices machine-consumable.", "Favor work that improves portability by reducing accidental repo-, language-, agent-, vendor-, or local-tool assumptions.", "Favor work that makes the correct action easy to construct before validation runs.", "Question work that mainly adds framework feel, narrative residue, or new visible concepts without replacing older ones.", "Question work that treats validation success alone as proof that the larger intent was satisfied.", "Question work that relies on repeated validation failures as the authoring interface for package-owned artifacts or workflows."]
open_questions = []
interpretation_notes = "Manually extracted on 2026-04-24 and refined on 2026-04-26 from the declared source hints in `.agentic-workspace/config.toml`: `SYSTEM_INTENT.md` as the primary directional source and `README.md` as corroborating public-facing orientation. This declaration is a normalized operating compass, not a scheduler, a source-file mirror, or active task state."
confidence = "high"
needs_review = false
preferred_source = "SYSTEM_INTENT.md"
last_synced_at = "2026-05-05"

