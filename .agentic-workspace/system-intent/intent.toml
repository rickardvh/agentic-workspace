[[architecture_principles]]
id = "host-agnostic-agent-judgment"
title = "Preserve host-agnostic agent judgment"
authority = "repo-system-intent"
owner = "workspace-runtime"
summary = "AW provides infrastructure, state, evidence, routing surfaces, and guardrails that make agent judgment cheap, efficient, and reliable; it must not encode repo-specific rules, routing tables, workflow meanings, executable names, file-name conventions, issue taxonomy, or local heuristics as package-owned a priori policy."
derived_from = [
  "governing_intents:Keep package contracts portable across host repos, languages, agents, vendors, and local dogfooding environments.",
  "anti_intents:Do not let this repo's current language, tooling, structure, or agent preferences become hidden universal product assumptions.",
  "decision_tests:Favor work that improves portability by reducing accidental repo-, language-, agent-, vendor-, or local-tool assumptions.",
  "issue:#1665",
  "issue:#1666"
]
allowed_sources = [
  "explicit structured facts",
  "AW-owned enum labels",
  "configuration",
  "manifest metadata",
  "planning state",
  "generated contracts",
  "learned host or local Memory surfaced as owner evidence",
  "explicit user or issue intent"
]
