schema_version = 1

[workspace]
workflow_path = ".agentic-workspace/WORKFLOW.md"
ownership_manifest_path = ".agentic-workspace/OWNERSHIP.toml"
managed_root = ".agentic-workspace/"

[ownership_classes.repo_owned]
summary = "Repository-native state owned by the repo and not upgrade-replaceable by installed packages."

[ownership_classes.managed_fence]
summary = "Product-managed content inside an explicit fence in a repo-owned file."

[ownership_classes.module_managed]
summary = "Upgrade-replaceable content owned by one installed module under .agentic-workspace/."

[[module_roots]]
module = "workspace"
path = ".agentic-workspace/"
ownership = "module_managed"
uninstall_policy = "remove-managed-files-only"

[[module_roots]]
module = "memory"
path = ".agentic-workspace/memory/"
ownership = "module_managed"
uninstall_policy = "remove-managed-files-only"

[[module_roots]]
module = "planning"
path = ".agentic-workspace/planning/"
ownership = "module_managed"
uninstall_policy = "remove-managed-files-only"

[[managed_surfaces]]
module = "workspace"
path = ".agentic-workspace/WORKFLOW.md"
kind = "workflow-contract"
ownership = "module_managed"
uninstall_policy = "remove-if-owned"

[[managed_surfaces]]
module = "workspace"
path = ".agentic-workspace/OWNERSHIP.toml"
kind = "ownership-ledger"
ownership = "module_managed"
uninstall_policy = "remove-if-owned"

[[managed_surfaces]]
module = "workspace"
path = ".agentic-workspace/system-intent/WORKFLOW.md"
kind = "system-intent-workflow"
ownership = "module_managed"
uninstall_policy = "remove-if-owned"

[[managed_surfaces]]
module = "memory"
path = ".agentic-workspace/memory/**"
kind = "module-root"
ownership = "module_managed"
uninstall_policy = "remove-if-owned"

[[managed_surfaces]]
module = "planning"
path = ".agentic-workspace/planning/**"
kind = "module-root"
ownership = "module_managed"
uninstall_policy = "remove-if-owned"

[[fences]]
name = "workspace-workflow-pointer"
module = "workspace"
file = "AGENTS.md"
start = "<!-- agentic-workspace:workflow:start -->"
end = "<!-- agentic-workspace:workflow:end -->"
ownership = "managed_fence"
uninstall_policy = "remove-fence-only"

[[authority_surfaces]]
concern = "startup-instructions"
surface = "AGENTS.md"
owner = "repo"
ownership = "repo_owned"
authority = "primary"
summary = "Repo-level startup instructions and local operating constraints."

[[authority_surfaces]]
concern = "workspace-policy"
surface = ".agentic-workspace/config.toml"
owner = "repo"
ownership = "repo_owned"
authority = "primary"
summary = "Repo-owned workspace policy, workflow obligations, and structured operating settings."

[[authority_surfaces]]
concern = "compact-planning-state"
surface = ".agentic-workspace/planning/state.toml"
owner = "planning"
ownership = "module_managed"
authority = "primary"
summary = "Consolidated active queue and roadmap state owned by the planning package."

[[authority_surfaces]]
concern = "design-constraints"
surface = "docs/design-principles.md"
owner = "repo"
ownership = "repo_owned"
authority = "primary"
summary = "Design tests for product-shape, ownership, and lifecycle changes."

[[authority_surfaces]]
concern = "shared-workflow-contract"
surface = ".agentic-workspace/WORKFLOW.md"
owner = "workspace"
ownership = "module_managed"
authority = "primary"
summary = "Shared workflow rules installed by the workspace layer."

[[authority_surfaces]]
concern = "ownership-ledger"
surface = ".agentic-workspace/OWNERSHIP.toml"
owner = "workspace"
ownership = "module_managed"
authority = "primary"
summary = "Ownership ledger for managed paths, fences, and authority surfaces."

[[authority_surfaces]]
concern = "system-intent-mirror"
surface = ".agentic-workspace/system-intent/intent.toml"
owner = "workspace"
ownership = "module_managed"
authority = "primary"
summary = "Workspace-owned mirrored system-intent contract consumed by package operations."

[[authority_surfaces]]
concern = "agent-aid-candidates"
surface = ".agentic-workspace/agent-aids/"
owner = "repo"
ownership = "repo_owned"
authority = "candidate"
summary = "Optional checked-in candidate area for reusable agent-created aids before promotion to ordinary repo-native surfaces."

[[authority_surfaces]]
concern = "planning-install-tree"
surface = ".agentic-workspace/planning/"
owner = "planning"
ownership = "module_managed"
authority = "primary"
summary = "Planning-owned installed workflow and helper surfaces."

[[authority_surfaces]]
concern = "memory-shared-support"
surface = ".agentic-workspace/memory/"
owner = "memory"
ownership = "module_managed"
authority = "primary"
summary = "Memory-owned shared workflow, version, bootstrap, and skill support surfaces."

[[authority_surfaces]]
concern = "workspace-workflow-pointer"
surface = "AGENTS.md#agentic-workspace:workflow"
owner = "workspace"
ownership = "managed_fence"
authority = "fenced"
summary = "Managed pointer block inside the repo-owned AGENTS file."

[[subsystems]]
id = "planning"
paths = [".agentic-workspace/planning/**", "packages/planning/**"]
owns = ["active execution state", "execplan scaffolds and closeout", "planning package workflow semantics"]
does_not_own = ["durable memory note policy", "workspace command runtime internals"]
escalate_when = ["change widens planning state semantics", "closeout or archive behavior changes"]

[[subsystems]]
id = "memory"
paths = [".agentic-workspace/memory/**", "packages/memory/**"]
owns = ["durable repo knowledge", "memory note routing", "memory package workflow semantics"]
does_not_own = ["active execution planning", "workspace command runtime internals"]
escalate_when = ["change widens what memory may store", "promotion policy changes"]

[[subsystems]]
id = "workspace-cli-runtime"
paths = ["generated/workspace/python/**"]
owns = ["workspace command routing", "compact report assembly", "runtime adapter dispatch"]
does_not_own = ["planning package state semantics", "memory note policy", "generated command package source contracts"]
proof = ["uv run pytest tests/test_workspace_cli.py -q"]
escalate_when = ["change widens public command contract", "change requires planning or memory package semantics"]

[[subsystems]]
id = "model-cli-harness"
paths = ["tools/model-cli-harness/**", "scripts/model_cli_harness/**", "tests/test_model_cli_harness.py"]
owns = ["model CLI dogfooding scenarios", "adaptive model-run evaluation records", "harness scorer guardrails"]
does_not_own = ["formal benchmark policy", "provider authentication", "package runtime command semantics"]
proof = ["uv run pytest tests/test_model_cli_harness.py -q"]
escalate_when = ["scenario changes become formal benchmark policy", "provider instability is misclassified as product behavior"]

[notes]
purpose = "This file defines the workspace ownership ledger and authority map. Installers should converge on this ledger instead of maintaining duplicated managed-path heuristics."
